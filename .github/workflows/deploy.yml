name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts <<'EOF'
          37.120.188.157 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILDORNXS0WqMQL+BkZ6KRZON1Fpd13fOeGxzUPmVElCS
          37.120.188.157 ssh-rsa 
          37.120.188.157 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBNGIBpfq7H61NrmwOmS4npWFZIsJuURB4Xh47BL3p2IMnlLW2jTpXsCh6lgOgkkiX584eQp4nubMMNDCbtfcP0I=
          EOF

      - name: Create Kamal secrets file
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ROLLBAR_ACCESS_TOKEN: ${{ secrets.ROLLBAR_ACCESS_TOKEN }}
          ROLLBAR_ENABLED: ${{ secrets.ROLLBAR_ENABLED }}
          NEWRELIC_LICENSE_KEY: ${{ secrets.NEWRELIC_LICENSE_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET: ${{ secrets.AWS_SECRET }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PASS=${POSTGRES_PASSWORD}
          ROLLBAR_ACCESS_TOKEN=${ROLLBAR_ACCESS_TOKEN}
          ROLLBAR_ENABLED=${ROLLBAR_ENABLED}
          NEWRELIC_LICENSE_KEY=${NEWRELIC_LICENSE_KEY}
          AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
          AWS_SECRET=${AWS_SECRET}
          UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
          EOF

      - name: Deploy with Kamal
        run: bin/kamal deploy

      - name: Notify Rollbar of deploy
        if: success()
        run: |
          curl -s -X POST https://api.rollbar.com/api/1/deploy \
            -F access_token=${{ secrets.ROLLBAR_ACCESS_TOKEN }} \
            -F environment=production \
            -F revision=${{ github.sha }} \
            -F local_username=${{ github.actor }}
